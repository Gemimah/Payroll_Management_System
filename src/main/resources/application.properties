spring.application.name=employee-system
server.port=8081

# DEV database (H2). Later we can switch to PostgreSQL for procedures/triggers.
spring.datasource.url=jdbc:h2:mem:employee_system;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# JWT (must be >= 32 chars for HS256)
security.jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET_KEY_32CHARS_MIN
security.jwt.expiration-minutes=120

# SMTP mail setup (provide values via environment variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
